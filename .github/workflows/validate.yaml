name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python
        run: PYTHONPATH=packages/context_core/src:apps/cli/src python -m compileall apps packages tests
      - name: Run unit tests
        run: PYTHONPATH=packages/context_core/src:apps/cli/src python -m unittest discover -s tests
      - name: Validate JSON contracts and profiles
        run: find contracts profiles -name '*.json' -exec python -m json.tool {} \;
